name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Verificar se GitHub Pages está ativado
        run: |
          STATUS=$(curl -s -o /tmp/pages.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages")
          if [ "$STATUS" = "404" ]; then
            echo "::error title=GitHub Pages não ativado::Ative em Settings → Pages → Source: GitHub Actions"
            echo "URL: https://github.com/${{ github.repository }}/settings/pages"
            exit 1
          fi

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build site
        run: node scripts/build-pages.js

      - name: Validar artefato
        run: |
          test -f dist/pages/index.html || (echo "index.html ausente" && exit 1)
          test -f dist/pages/lib/placeAutocomplete.js || (echo "lib ausente" && exit 1)
          ls -la dist/pages/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/pages

      - uses: actions/upload-artifact@v4
        with:
          name: chrome-extension
          path: dist/meta-travel-extension-*.zip
          retention-days: 14
          if-no-files-found: ignore

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Não cancela deploy em andamento — evita "Deployment failed, try again later"
    concurrency:
      group: pages-deploy
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verificar URL publicada
        if: steps.deployment.outputs.page_url != ''
        run: |
          echo "Site publicado em: ${{ steps.deployment.outputs.page_url }}"
          echo "## Deploy concluído" >> $GITHUB_STEP_SUMMARY
          echo "URL: ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
